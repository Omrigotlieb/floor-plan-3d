name: floor-plan-3d
region: nyc
services:
  - name: web
    dockerfile_path: Dockerfile
    github:
      repo: Omrigotlieb/floor-plan-3d
      branch: main
      deploy_on_push: true
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xs
    health_check:
      http_path: /
    envs:
      - key: ANTHROPIC_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: NODE_ENV
        scope: RUN_AND_BUILD_TIME
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        scope: BUILD_TIME
        value: "1"
